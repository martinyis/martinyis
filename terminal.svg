<svg width="600" height="200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes typing1 {
      0%, 15% { width: 0 }
      25%, 100% { width: 168px }
    }
    @keyframes typing2 {
      0%, 30% { width: 0 }
      50%, 100% { width: 530px }
    }
    @keyframes typing3 {
      0%, 55% { width: 0 }
      75%, 100% { width: 480px }
    }
    @keyframes blink {
      0%, 100% { opacity: 1 }
      50% { opacity: 0 }
    }
    @keyframes cursorMove {
      0%, 74% { cy: 155; cx: 0 }
      75%, 100% { cy: 155 }
    }
    .terminal-bg {
      fill: #1a1b26;
      rx: 10;
    }
    .titlebar {
      fill: #24283b;
      rx: 10;
    }
    .titlebar-cover {
      fill: #24283b;
    }
    .dot-red { fill: #ff5f57; }
    .dot-yellow { fill: #febc2e; }
    .dot-green { fill: #28c840; }
    .title-text {
      fill: #565f89;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12px;
    }
    .prompt {
      fill: #7aa2f7;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 14px;
      font-weight: bold;
    }
    .command {
      fill: #c0caf5;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 14px;
    }
    .output {
      fill: #9ece6a;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
    }
    .output-dim {
      fill: #a9b1d6;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      font-style: italic;
    }
    .line1 {
      overflow: hidden;
      animation: typing1 4s steps(20) infinite;
    }
    .line2 {
      overflow: hidden;
      animation: typing2 4s steps(60) infinite;
    }
    .line3 {
      overflow: hidden;
      animation: typing3 4s steps(55) infinite;
    }
    .cursor {
      fill: #c0caf5;
      animation: blink 1s step-end infinite;
    }
  </style>

  <!-- Terminal window -->
  <rect class="terminal-bg" x="0" y="0" width="600" height="200" />

  <!-- Title bar -->
  <rect class="titlebar" x="0" y="0" width="600" height="36" />
  <rect class="titlebar-cover" x="0" y="26" width="600" height="10" />

  <!-- Traffic lights -->
  <circle class="dot-red" cx="20" cy="18" r="6" />
  <circle class="dot-yellow" cx="40" cy="18" r="6" />
  <circle class="dot-green" cx="60" cy="18" r="6" />

  <!-- Title -->
  <text class="title-text" x="260" y="22" text-anchor="middle">stan@github ~ %</text>

  <!-- Line 1: command -->
  <text class="prompt" x="20" y="70">$</text>
  <svg x="35" y="55" width="168" height="20">
    <rect width="168" height="20" fill="#1a1b26"/>
    <svg class="line1" width="168" height="20">
      <text class="command" x="0" y="15">stan --hire</text>
    </svg>
  </svg>

  <!-- Line 2: output -->
  <svg x="20" y="85" width="530" height="20">
    <rect width="530" height="20" fill="#1a1b26"/>
    <svg class="line2" width="530" height="20">
      <text class="output" x="0" y="15">→ Sponsor my Claude Code max plan and I'll build you amazing stuff.</text>
    </svg>
  </svg>

  <!-- Line 3: output dim -->
  <svg x="20" y="115" width="480" height="20">
    <rect width="480" height="20" fill="#1a1b26"/>
    <svg class="line3" width="480" height="20">
      <text class="output-dim" x="0" y="15">Salary and equity are a nice bonus, please and thank you.</text>
    </svg>
  </svg>

  <!-- Blinking cursor -->
  <rect class="cursor" x="20" y="148" width="8" height="16" rx="1" />
</svg>
